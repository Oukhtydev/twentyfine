<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For You 💙</title>
  <meta property="og:title"       content="For You 💙" />
  <meta property="og:description" content="A little something made with all my heart, just for your special day 🎂" />
  <meta property="og:type"        content="website" />
  <meta name="apple-mobile-web-app-title" content="For You 💙" />
  <meta name="application-name"           content="For You 💙" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #f0d080;
      --gold-dim:   #8a6820;
      --deep:       #0a0a14;
      --navy2:      #112240;
      --surface2:   #1e2d45;
      --text:       #eee8d8;
      --text-dim:   #9aaac0;
      --radius:     14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: clamp(16px, 4vw, 32px);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(42,60,110,0.7) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 85% 90%, rgba(50,30,80,0.6) 0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 50% 50%, rgba(10,10,20,0.5) 0%, transparent 80%);
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at  7% 11%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 21% 37%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(2px   2px   at 37%  7%, rgba(255,255,255,0.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 54% 24%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 69% 48%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(2px   2px   at 82% 17%, rgba(255,255,255,0.80) 0%, transparent 100%),
        radial-gradient(1px   1px   at 90% 67%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1px   1px   at 11% 71%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 47% 82%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px   1px   at 29% 57%, rgba(201,168,76,0.50)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 61% 77%, rgba(201,168,76,0.40)  0%, transparent 100%),
        radial-gradient(1px   1px   at 76% 34%, rgba(180,200,255,0.35) 0%, transparent 100%),
        radial-gradient(1px   1px   at 43% 19%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 93% 45%, rgba(201,168,76,0.35)  0%, transparent 100%);
      z-index: -1;
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift {
      0%   { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-10px) translateX(6px); }
    }

    .deco-line {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 99;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1; box-shadow: 0 0 22px var(--gold); }
    }

    /* ── Cadeaux flottants en arrière-plan ── */
    .gifts-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .gift {
      position: absolute;
      animation: giftFloat linear infinite;
      opacity: 0;
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.4));
    }
    @keyframes giftFloat {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      5%   { opacity: 0.65; }
      90%  { opacity: 0.45; }
      100% { transform: translateY(-15vh) translateX(var(--dx,30px)) rotate(var(--rot,20deg)); opacity: 0; }
    }

    /* ── Carte principale ── */
    .main-card {
      position: relative; z-index: 1;
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      border: 1px solid rgba(201,168,76,0.38);
      border-radius: clamp(16px, 3vw, 24px);
      padding: clamp(28px, 6vw, 60px) clamp(20px, 7vw, 68px);
      max-width: min(520px, 95vw);
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(201,168,76,0.22);
      animation: cardEntrance 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: scale(0.88) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .main-card::before {
      content: '';
      position: absolute; inset: 10px;
      border-radius: calc(clamp(16px, 3vw, 24px) - 4px);
      border: 1px solid rgba(201,168,76,0.12);
      pointer-events: none;
    }

    /* ── Titre ── */
    .for-you {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 12vw, 5.5rem);
      font-weight: 400; line-height: 1.1; margin-bottom: 4px;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #a06010 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      background-size: 200% auto;
      animation: shimmer 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% center; }
      50%      { background-position: 100% center; }
    }

    .gold-divider {
      width: clamp(70px, 20vw, 130px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(12px, 2.5dvh, 18px) auto;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.88rem, 2.5vw, 1.15rem);
      color: var(--text-dim); margin-bottom: clamp(20px, 4vw, 32px);
      line-height: 1.65;
    }

    .gift-row {
      display: flex; justify-content: center;
      gap: clamp(6px, 2vw, 16px);
      margin-bottom: clamp(20px, 4vw, 30px);
      flex-wrap: wrap;
    }
    .gift-box {
      font-size: clamp(1.3rem, 4vw, 2rem);
      animation: giftBoxPulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.5));
    }
    .gift-box:nth-child(1){animation-delay:0s;}
    .gift-box:nth-child(2){animation-delay:.3s;}
    .gift-box:nth-child(3){animation-delay:.6s;}
    .gift-box:nth-child(4){animation-delay:.9s;}
    .gift-box:nth-child(5){animation-delay:1.2s;}
    @keyframes giftBoxPulse {
      0%,100% { transform: scale(1) translateY(0); }
      50%      { transform: scale(1.12) translateY(-5px); }
    }

    /* ── Mot de passe ── */
    .password-label {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.6rem, 1.5vw, 0.7rem);
      font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px; display: block;
    }
    .input-wrap {
      display: flex; align-items: stretch;
      margin-bottom: 10px; border-radius: 30px;
      overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .password-input {
      flex: 1; min-width: 0;
      background: rgba(10,10,20,0.75);
      border: 1px solid rgba(201,168,76,0.35);
      border-right: none; border-radius: 30px 0 0 30px;
      padding: clamp(10px, 2.5vw, 14px) clamp(12px, 3vw, 18px);
      color: var(--text); font-family: 'Raleway', sans-serif;
      font-size: clamp(0.82rem, 2vw, 0.95rem);
      letter-spacing: 3px; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .password-input::placeholder {
      color: rgba(138,154,176,0.5); letter-spacing: 1px;
      font-style: italic; font-size: clamp(0.72rem, 1.8vw, 0.82rem);
    }
    .password-input:focus {
      border-color: rgba(201,168,76,0.7);
      box-shadow: inset 0 0 0 2px rgba(201,168,76,0.15);
    }
    .unlock-btn {
      background: linear-gradient(135deg, var(--gold-light), var(--gold), #8a5010);
      border: none; border-radius: 0 30px 30px 0;
      padding: clamp(10px, 2.5vw, 14px) clamp(14px, 3.5vw, 22px);
      color: var(--deep); font-family: 'Cinzel', serif;
      font-size: clamp(0.68rem, 1.8vw, 0.8rem);
      font-weight: 700; letter-spacing: 1.5px; cursor: pointer;
      transition: all 0.3s ease; white-space: nowrap;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .unlock-btn:hover {
      background: linear-gradient(135deg, #fff8e0, var(--gold-light), var(--gold));
      box-shadow: 0 6px 26px rgba(201,168,76,0.55); transform: translateX(2px);
    }
    .unlock-btn:active { transform: scale(0.97); }
    .lock-icon { font-size: clamp(0.85rem, 2vw, 1rem); transition: transform 0.3s; }
    .unlock-btn:hover .lock-icon { transform: rotate(-15deg) scale(1.15); }

    .error-msg {
      font-size: clamp(0.65rem, 1.8vw, 0.75rem);
      color: #e07070; font-style: italic; min-height: 18px;
      margin-top: 4px; letter-spacing: 0.5px;
    }
    .error-msg.shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
    }

    .page-exit { animation: exitFade 0.7s ease forwards; }
    @keyframes exitFade { to { opacity: 0; transform: scale(1.04); } }

    .particle {
      position: fixed; pointer-events: none; z-index: 10;
      animation: particleFloat linear forwards;
    }
    @keyframes particleFloat {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.95; }
      100% { transform: translateY(-88dvh) translateX(var(--dx,20px)) scale(0.2); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 380px) {
      .main-card { padding: 24px 16px; }
      .unlock-btn { padding: 10px 12px; letter-spacing: 0.5px; }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <div class="gifts-container" id="giftsContainer"></div>

  <div class="main-card" id="mainCard">

    <h1 class="for-you">For You</h1>
    <div class="gold-divider"></div>

    <p class="subtitle">
      A little something made with all my heart,<br>
      just for your special day 🎂
    </p>

    <div class="gift-row">
      <span class="gift-box">🎁</span>
      <span class="gift-box">🎀</span>
      <span class="gift-box">🎂</span>
      <span class="gift-box">🎊</span>
      <span class="gift-box">🎁</span>
    </div>

    <label class="password-label" for="pwd">✦ Enter your secret code ✦</label>
    <div class="input-wrap">
      <input
        class="password-input"
        id="pwd"
        type="password"
        placeholder="your secret word…"
        autocomplete="off"
        maxlength="30"
      />
      <button class="unlock-btn" onclick="checkPassword()">
        <span class="lock-icon">🔐</span> Unlock
      </button>
    </div>
    <p class="error-msg" id="errorMsg"></p>

  </div>

  <script>
    const SECRET = "chocobeurre";

    function checkPassword() {
      const val = document.getElementById('pwd').value.trim().toLowerCase();
      const err = document.getElementById('errorMsg');

      if (val === SECRET) {
        err.textContent = '';
        for (let i = 0; i < 20; i++) {
          setTimeout(() => spawnParticles(
            ['✦','✧','⋆','◆','✩'],
            ['#f0d080','#c9a84c','#ffffff']
          ), i * 60);
        }
        document.getElementById('mainCard').classList.add('page-exit');
        setTimeout(() => { window.location.href = 'accueil.html'; }, 700);

      } else {
        err.textContent = '✦ Incorrect code — try again ✦';
        err.classList.remove('shake');
        void err.offsetWidth;
        err.classList.add('shake');
        document.getElementById('pwd').value = '';
        spawnParticles(['✦'], ['#e07070']);
      }
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    /* Cadeaux flottants */
    const giftEmojis = ['🎁','🎀','🎊','🎂','⭐','✨','🌟','💛','🎉'];
    const container  = document.getElementById('giftsContainer');

    function spawnBgGift() {
      const el = document.createElement('div');
      el.className = 'gift';
      el.textContent = giftEmojis[Math.floor(Math.random() * giftEmojis.length)];
      el.style.left = (Math.random() * 100) + 'vw';
      el.style.bottom = '-10vh';
      el.style.setProperty('--dx',  (Math.random() * 120 - 60) + 'px');
      el.style.setProperty('--rot', (Math.random() * 40 - 20) + 'deg');
      const dur = 8 + Math.random() * 10;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay    = (Math.random() * 4) + 's';
      el.style.fontSize = (Math.random() * 16 + 14) + 'px';
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 4) * 1000);
    }

    for (let i = 0; i < 8; i++) setTimeout(spawnBgGift, i * 600);
    setInterval(spawnBgGift, 2500);

    /* Particules */
    function spawnParticles(syms, cols) {
      for (let k = 0; k < 5; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = syms[Math.floor(Math.random() * syms.length)];
        p.style.color = cols[Math.floor(Math.random() * cols.length)];
        p.style.left  = (Math.random() * 100) + 'vw';
        p.style.top   = '70dvh';
        p.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
        p.style.fontSize = (Math.random() * 12 + 9) + 'px';
        p.style.animationDuration = (2 + Math.random() * 2.5) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    setInterval(() => spawnParticles(
      ['✦','✧','⋆','·','◆'],
      ['#c9a84c','#f0d080','#ffffff']
    ), 1400);
  </script>

</body>
</html>
