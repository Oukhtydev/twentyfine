<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>25 Reasons Why You Are Amazing</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #8a6820;
      --deep:        #0a0a14;
      --navy2:       #112240;
      --surface2:    #1e2d45;
      --text:        #eee8d8;
      --text-dim:    #9aaac0;
      --radius:      10px;

      /* ── Tailles des cartes — clamp adaptatif ── */
      --cw:     clamp(44px, 8.5vw, 78px);
      --ch:     clamp(54px, 10.5vw, 96px);
      --gap:    clamp(4px, 0.8vw, 8px);
      --sep:    clamp(12px, 3vw, 40px);
      --ftitle: clamp(6px,  1.1vw, 9.5px);
      --fback:  clamp(6.5px,1.2vw, 10.5px);
      --fnum:   clamp(5.5px,0.8vw, 8px);
      --bnum:   clamp(13px, 1.9vw, 20px);  /* diamètre badge numéro */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(60px, 9vh, 100px) clamp(8px, 2.5vw, 20px) 70px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Fond étoilé ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 90% 60% at 15% 10%, rgba(42,60,110,0.80) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 85% 90%, rgba(50,30,80,0.65)  0%, transparent 65%),
        radial-gradient(ellipse 60% 70% at 50% 50%, rgba(10,10,20,0.55)  0%, transparent 80%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1.5px 1.5px at  8% 12%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 22% 38%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(2px   2px   at 38%  8%, rgba(255,255,255,0.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 55% 25%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 70% 50%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(2px   2px   at 83% 18%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 91% 68%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px   1px   at 12% 72%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 83%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1px   1px   at 30% 58%, rgba(201,168,76,0.55)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 62% 78%, rgba(201,168,76,0.45)  0%, transparent 100%),
        radial-gradient(1px   1px   at 77% 35%, rgba(180,200,255,0.40)  0%, transparent 100%);
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift {
      to { transform: translateY(-10px) translateX(6px); }
    }

    /* ── Barre dorée ── */
    .deco-line {
      position: fixed;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow {
      0%,100% { opacity: 0.75; }
      50%      { opacity: 1; box-shadow: 0 0 22px var(--gold); }
    }

    /* ── Bouton retour ── */
    .retour {
      position: fixed;
      top: 18px; left: 18px;
      padding: 7px 16px;
      border: 1px solid var(--gold-dim);
      border-radius: 30px;
      background: rgba(20,24,42,0.75);
      color: var(--gold-light);
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.62rem, 1.4vw, 0.78rem);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      z-index: 999;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .retour:hover {
      background: var(--gold-dim);
      color: #fff;
      transform: translateX(-3px);
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: clamp(20px, 3.5vh, 42px);
      animation: fadeDown 1s ease both;
      padding: 0 8px;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 3.2vw, 2.4rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.25;
      text-shadow: 0 0 40px rgba(201,168,76,0.35);
    }
    .header-title span { color: var(--gold-light); }
    .gold-divider {
      width: clamp(60px, 12vw, 110px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(8px, 1.5vh, 14px) auto;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.78rem, 1.7vw, 1rem);
      color: var(--text-dim);
    }

    /* ══════════════════════════════════════
       GRILLE 25
       "2" = 3 cols | sep | "5" = 4 cols
    ══════════════════════════════════════ */
    .grid-25 {
      display: grid;
      grid-template-columns:
        repeat(3, var(--cw))
        var(--sep)
        repeat(4, var(--cw));
      grid-template-rows: repeat(5, var(--ch));
      gap: var(--gap);
      animation: fadeDown 1.3s ease 0.4s both;
    }

    /* ── Carte ── */
    .card {
      width: var(--cw);
      height: var(--ch);
      cursor: pointer;
      perspective: 800px;
      animation: cardReveal 0.55s ease both;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.84) translateY(16px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 0.68s cubic-bezier(0.4,0,0.2,1);
      transform-style: preserve-3d;
      border-radius: var(--radius);
    }
    .card:hover .card-inner,
    .card.flipped .card-inner { transform: rotateY(180deg); }

    .card-front, .card-back {
      position: absolute;
      width: 100%; height: 100%;
      border-radius: var(--radius);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(4px, 0.8vw, 8px) clamp(3px, 0.6vw, 6px);
      text-align: center;
    }

    /* Face avant */
    .card-front {
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      border: 1px solid rgba(201,168,76,0.38);
      box-shadow: 0 6px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(201,168,76,0.22);
    }
    .card-front::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid rgba(201,168,76,0.12);
      pointer-events: none;
    }
    .card:hover .card-front {
      box-shadow: 0 10px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(201,168,76,0.32), 0 0 14px rgba(201,168,76,0.13);
    }

    /* Badge numéro doré circulaire */
    .card-num {
      font-family: 'Cinzel', serif;
      font-size: var(--fnum);
      letter-spacing: 0.5px;
      color: var(--deep);
      background: linear-gradient(135deg, var(--gold-light), var(--gold), #a06010);
      border-radius: 50%;
      width: var(--bnum);
      height: var(--bnum);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 3px;
      box-shadow: 0 0 7px rgba(201,168,76,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
      flex-shrink: 0;
      font-weight: 700;
    }

    .card-title {
      font-family: 'Raleway', sans-serif;
      font-size: var(--ftitle);
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
      line-height: 1.25;
    }

    /* Face arrière */
    .card-back {
      background: linear-gradient(145deg, #f7f2e8, #ede6d4);
      border: 1px solid rgba(201,168,76,0.55);
      box-shadow: 0 6px 22px rgba(0,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.9);
      transform: rotateY(180deg);
    }
    .card-back::before {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px; bottom: 4px;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid rgba(201,168,76,0.25);
      pointer-events: none;
    }
    .card-back-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: var(--fback);
      font-weight: 400;
      line-height: 1.5;
      color: #1e1206;
      padding: 0 2px;
    }

    /* Cellule vide */
    .empty { width: var(--cw); height: var(--ch); }

    /* ── Footer ── */
    .footer {
      margin-top: clamp(28px, 4.5vh, 56px);
      text-align: center;
      animation: fadeDown 1.7s ease 0.9s both;
    }
    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2.5vw, 1.4rem);
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,168,76,0.42);
    }
    .footer-sub {
      font-size: clamp(0.56rem, 1vw, 0.68rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* ── Particules ── */
    .particle {
      position: fixed;
      pointer-events: none; z-index: 10;
      animation: particleFloat linear forwards;
    }
    @keyframes particleFloat {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-88vh) translateX(var(--dx,20px)) scale(0.2); opacity: 0; }
    }

    /* ── Breakpoint très petit écran ── */
    @media (max-width: 380px) {
      :root {
        --cw:   40px;
        --ch:   50px;
        --gap:  3px;
        --sep:  8px;
        --ftitle: 5px;
        --fback:  5.5px;
        --fnum:   4.5px;
        --bnum:   11px;
      }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <a href="accueil.html" class="retour">← Retour</a>

  <header class="header">
    <h1 class="header-title">25 <span>Reasons</span> Why You Are Amazing</h1>
    <div class="gold-divider"></div>
  </header>

  <div class="grid-25" id="grid"></div>

  <footer class="footer">
    <p class="footer-text">Merci d'être exactement qui tu es 💙</p>
    <p class="footer-sub">avec tout mon amour</p>
  </footer>

  <script>
    const Q = {
       1: {front:"Sourire radieux",        back:"Un sourire qui illumine chaque journée."},
       2: {front:"Gentillesse sincère",    back:"Une douceur qui touche le cœur."},
       3: {front:"Intelligence brillante", back:"Une sagesse qui inspire profondément."},
       4: {front:"Tendresse infinie",      back:"Un amour qui réchauffe l'âme."},
       5: {front:"Humour réconfortant",    back:"Des rires partagés inoubliables."},
       6: {front:"Écoute attentionnée",    back:"Toujours là pour entendre."},
       7: {front:"Ambition inspirante",    back:"Une volonté qui pousse à rêver."},
       8: {front:"Empathie douce",         back:"Compréhension sans jugement."},
       9: {front:"Courage remarquable",    back:"Une force qui impressionne."},
      10: {front:"Voix apaisante",         back:"Une mélodie qui calme tout."},
      11: {front:"Honnêteté pure",         back:"Une sincérité rare et précieuse."},
      12: {front:"Regard bienveillant",    back:"Un regard qui rassure toujours."},
      13: {front:"Énergie positive",       back:"Une lumière dans la vie."},
      14: {front:"Amour inconditionnel",   back:"Un amour qui ne faillit jamais."},
      15: {front:"Créativité débordante",  back:"Une imagination sans limite."},
      16: {front:"Patience admirable",     back:"Une sérénité qui apaise."},
      17: {front:"Générosité naturelle",   back:"Donner sans compter."},
      18: {front:"Curiosité éveillée",     back:"Toujours en quête de savoir."},
      19: {front:"Force tranquille",       back:"Un ancrage solide et rassurant."},
      20: {front:"Fidélité absolue",       back:"Une loyauté sans faille."},
      21: {front:"Sensibilité artistique", back:"Une âme qui ressent tout."},
      22: {front:"Spontanéité charmante",  back:"Chaque instant est une surprise."},
      23: {front:"Persévérance héroïque",  back:"Ne jamais abandonner."},
      24: {front:"Chaleur humaine",        back:"Une présence qui réconforte."},
      25: {front:"Élégance naturelle",     back:"Une grâce en toute chose."}
    };

    /*
      Layout 8 cols × 5 lignes
      "2" cols 0-2 (3 col) | sep col 3 | "5" cols 4-7 (4 col)

      Assignations selon demande :
        col: 0   1   2   3   4   5   6   7
        r0:  1   2   3   0   5   4   6   7
        r1:  0   0   8   0   9   0   0   0
        r2: 10  11  12   0  13  14  15  16
        r3: 17   0   0   0   0   0   0  18
        r4: 19  20  21   0  22  23  24  25
    */
    const layout = [
      [ 1,  2,  3, 0,  4,  5,  6,  7],
      [ 0,  0,  8, 0,  9,  0,  0,  0],
      [10, 11, 12, 0, 13, 14, 15, 16],
      [17,  0,  0, 0,  0,  0,  0, 18],
      [19, 20, 21, 0, 22, 23, 24, 25],
    ];

    const grid = document.getElementById('grid');

    layout.forEach((row, r) => {
      row.forEach((qualNum, c) => {
        if (qualNum > 0) {
          const q = Q[qualNum];
          const card = document.createElement('div');
          card.className = 'card';
          card.style.animationDelay = (r * 0.07 + c * 0.045) + 's';
          card.innerHTML = `
            <div class="card-inner">
              <div class="card-front">
                <div class="card-num">${qualNum}</div>
                <div class="card-title">${q.front}</div>
              </div>
              <div class="card-back">
                <div class="card-back-desc">${q.back}</div>
              </div>
            </div>`;
          card.addEventListener('click', () => card.classList.toggle('flipped'));
          card.addEventListener('mouseenter', () => spawnParticles(card));
          grid.appendChild(card);
        } else {
          const empty = document.createElement('div');
          empty.className = 'empty';
          grid.appendChild(empty);
        }
      });
    });

    /* ── Particules ── */
    const symbols = ['✦','✧','◆','⋆','✩','·'];
    const colors  = ['#c9a84c','#f0d080','#e07090','#90c8e0','#ffffff'];

    function spawnParticles(origin) {
      const rect = origin ? origin.getBoundingClientRect() : null;
      for (let k = 0; k < 4; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        p.style.color = colors[Math.floor(Math.random() * colors.length)];
        p.style.left  = rect
          ? (rect.left + rect.width / 2 + (Math.random() * 50 - 25)) + 'px'
          : (Math.random() * 100) + 'vw';
        p.style.top   = rect ? (rect.top + rect.height / 2) + 'px' : '80vh';
        p.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
        p.style.fontSize = (Math.random() * 8 + 7) + 'px';
        p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    setInterval(() => spawnParticles(null), 1400);
  </script>
</body>
</html>
