<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bucket List 🗺️</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #f0d080;
      --gold-dim:   #8a6820;
      --deep:       #0a0a14;
      --navy2:      #112240;
      --surface2:   #1e2d45;
      --text:       #eee8d8;
      --text-dim:   #9aaac0;
      --green:      #4caf6e;
      --radius:     14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(70px, 10dvh, 100px) clamp(12px, 4vw, 32px) 60px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Fond étoilé ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 15%, rgba(30,50,100,.75) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 80% 85%, rgba(50,25,80,.65) 0%, transparent 65%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1.5px 1.5px at  6% 10%, rgba(255,255,255,.85) 0%, transparent 100%),
        radial-gradient(2px   2px   at 36%  6%, rgba(255,255,255,.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 53% 22%, rgba(255,255,255,.65) 0%, transparent 100%),
        radial-gradient(2px   2px   at 81% 16%, rgba(255,255,255,.80) 0%, transparent 100%),
        radial-gradient(1px   1px   at 28% 55%, rgba(201,168,76,.50)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 76%, rgba(201,168,76,.40)  0%, transparent 100%);
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift { to { transform: translateY(-10px) translateX(6px); } }

    /* ── Barre dorée ── */
    .deco-line {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 99;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow { 0%,100% { opacity: .75; } 50% { opacity: 1; box-shadow: 0 0 22px var(--gold); } }

    /* ── Retour ── */
    .retour {
      position: fixed; top: 18px; left: 18px; z-index: 999;
      padding: 7px 16px;
      border: 1px solid var(--gold-dim); border-radius: 30px;
      background: rgba(20,24,42,.75); color: var(--gold-light);
      font-family: 'Raleway', sans-serif;
      font-size: clamp(.62rem, 1.4vw, .78rem);
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; backdrop-filter: blur(10px); transition: all .3s ease;
    }
    .retour:hover { background: var(--gold-dim); color: #fff; transform: translateX(-3px); }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: clamp(20px, 3.5dvh, 40px);
      animation: fadeDown 1s ease both;
      width: 100%;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-icon {
      font-size: clamp(2rem, 6vw, 3.2rem);
      display: block; margin-bottom: 10px;
      filter: drop-shadow(0 0 14px rgba(201,168,76,.6));
      animation: spinFloat 8s ease-in-out infinite;
    }
    @keyframes spinFloat {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: 400; color: var(--text);
      text-shadow: 0 0 40px rgba(201,168,76,.35);
      line-height: 1.2;
    }
    .header-title span { color: var(--gold-light); }
    .gold-divider {
      width: clamp(80px, 15vw, 130px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(10px, 2dvh, 16px) auto;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(.88rem, 2vw, 1.1rem); color: var(--text-dim);
    }

    /* ── Compteur ── */
    .counter-wrap {
      margin-bottom: clamp(16px, 3dvh, 28px);
      animation: fadeDown 1s ease .15s both;
      width: 100%; max-width: 660px;
      display: flex; align-items: center; gap: 14px;
    }
    .counter-text {
      font-family: 'Cinzel', serif;
      font-size: clamp(.6rem, 1.3vw, .75rem);
      letter-spacing: 3px; color: var(--gold);
      text-transform: uppercase; white-space: nowrap;
      flex-shrink: 0;
    }
    .progress-bar-bg {
      flex: 1; height: 4px; border-radius: 2px;
      background: rgba(201,168,76,.15);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
      width: 0%;
      transition: width .5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--gold);
    }

    /* ── Liste ── */
    .bucket-list {
      width: 100%; max-width: 660px;
      display: flex; flex-direction: column;
      gap: clamp(10px, 1.8dvh, 15px);
      animation: fadeDown 1.2s ease .3s both;
    }

    .bucket-item {
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      border: 1px solid rgba(201,168,76,.2);
      border-radius: var(--radius);
      padding: clamp(14px, 3vw, 20px) clamp(14px, 3vw, 22px);
      display: flex; align-items: center;
      gap: clamp(10px, 2.5vw, 18px);
      cursor: pointer;
      transition: all .3s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .bucket-item::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(201,168,76,.06), transparent);
      opacity: 0;
      transition: opacity .3s;
    }
    .bucket-item:hover::before { opacity: 1; }
    .bucket-item:hover {
      border-color: rgba(201,168,76,.45);
      transform: translateX(5px);
      box-shadow: 0 8px 28px rgba(0,0,0,.4), -4px 0 0 var(--gold-dim);
    }
    .bucket-item:active { transform: translateX(3px) scale(0.99); }

    /* État coché */
    .bucket-item.done {
      background: linear-gradient(145deg, #0a220a, #051005);
      border-color: rgba(76,175,110,.35);
    }
    .bucket-item.done::before { display: none; }
    .bucket-item.done:hover {
      border-color: rgba(76,175,110,.6);
      box-shadow: 0 8px 28px rgba(0,0,0,.4), -4px 0 0 var(--green);
    }
    .bucket-item.done .item-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }
    .bucket-item.done .item-sub { opacity: .55; }

    /* Cercle checkbox */
    .check-circle {
      width: clamp(24px, 5vw, 32px);
      height: clamp(24px, 5vw, 32px);
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,.4);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .35s cubic-bezier(.4,0,.2,1);
      font-size: clamp(.7rem, 1.6vw, .95rem);
      color: transparent;
    }
    .bucket-item.done .check-circle {
      background: linear-gradient(135deg, #5dd87d, #2d8050);
      border-color: #5dd87d;
      box-shadow: 0 0 12px rgba(76,175,110,.55);
      color: #fff;
      animation: checkPop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes checkPop {
      0%   { transform: scale(0.5); }
      100% { transform: scale(1); }
    }

    /* Icône */
    .item-icon {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      flex-shrink: 0;
      filter: drop-shadow(0 0 5px rgba(201,168,76,.35));
      transition: transform .3s ease;
    }
    .bucket-item:hover .item-icon { transform: scale(1.15) rotate(-5deg); }
    .bucket-item.done .item-icon  { filter: grayscale(.5); }

    /* Textes */
    .item-body { flex: 1; min-width: 0; }
    .item-text {
      font-size: clamp(.88rem, 2vw, 1.02rem);
      font-weight: 600; color: var(--text);
      margin-bottom: 3px;
      transition: color .3s;
      line-height: 1.3;
    }
    .item-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(.75rem, 1.6vw, .9rem);
      color: var(--text-dim);
      line-height: 1.4;
    }

    /* Numéro */
    .item-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(.5rem, 1vw, .62rem);
      color: rgba(201,168,76,.3);
      letter-spacing: 1px;
      flex-shrink: 0;
      align-self: flex-start;
      padding-top: 3px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: clamp(28px, 5dvh, 52px);
      text-align: center;
      animation: fadeDown 1.5s ease .7s both;
    }
    .footer-text {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: var(--gold-light);
      filter: drop-shadow(0 0 12px rgba(201,168,76,.4));
    }

    /* ── Particules ── */
    .particle {
      position: fixed; pointer-events: none; z-index: 10;
      animation: partFloat linear forwards;
    }
    @keyframes partFloat {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: .9; }
      100% { transform: translateY(-90dvh) translateX(var(--dx,20px)) rotate(180deg); opacity: 0; }
    }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media (max-width: 480px) {
      .bucket-item:hover { transform: translateX(3px); }
      .item-num { display: none; }
    }
    @media (max-width: 360px) {
      body { padding-left: 10px; padding-right: 10px; }
      .bucket-item { padding: 12px; gap: 10px; }
      .header-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <a href="accueil.html" class="retour">← Retour</a>

  <header class="header">
    <span class="header-icon">🗺️</span>
    <h1 class="header-title">Our <span>Bucket List</span></h1>
    <div class="gold-divider"></div>
    <p class="header-sub">Des aventures que l'on vivra ensemble, un jour</p>
  </header>

  <div class="counter-wrap">
    <span class="counter-text" id="counter">0 / 7 accomplis</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="bucket-list" id="bucketList"></div>

  <div class="footer">
    <p class="footer-text">Chaque aventure commence par un rêve 🌟</p>
  </div>

  <script>
    const items = [
      {
        icon: '✈️',
        text: 'Voyager ensemble',
        sub: 'Choisir une destination, faire les valises et partir à l\'aventure'
      },
      {
        icon: '🚗',
        text: 'Date night car',
        sub: 'Musique à fond, fenêtres ouvertes, destination inconnue'
      },
      {
        icon: '🌅',
        text: 'Regarder un lever du soleil',
        sub: 'Se lever tôt pour ce moment magique et silencieux'
      },
      {
        icon: '🎡',
        text: 'Parc d\'attraction',
        sub: 'Sensations fortes, rires et souvenirs garantis'
      },
      {
        icon: '🏖️',
        text: 'Journée à la plage',
        sub: 'Sable, mer, soleil et bonne humeur'
      },
      {
        icon: '📸',
        text: 'Faire des photos souvenirs',
        sub: 'Capturer nos meilleurs moments, ceux qu\'on n\'oubliera jamais'
      },
      {
        icon: '🎬',
        text: 'Aller au cinéma',
        sub: 'Popcorn, grand écran et une bonne séance ensemble'
      },
    ];

    const TOTAL = items.length;
    const list  = document.getElementById('bucketList');
    const counterEl = document.getElementById('counter');
    const fillEl    = document.getElementById('progressFill');
    let doneCount = 0;

    function updateProgress() {
      counterEl.textContent = `${doneCount} / ${TOTAL} accomplis`;
      fillEl.style.width = ((doneCount / TOTAL) * 100) + '%';
    }

    items.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'bucket-item';
      el.innerHTML = `
        <span class="item-num">${String(i + 1).padStart(2, '0')}</span>
        <div class="check-circle" id="chk${i}">✓</div>
        <span class="item-icon">${item.icon}</span>
        <div class="item-body">
          <p class="item-text">${item.text}</p>
          <p class="item-sub">${item.sub}</p>
        </div>`;

      el.addEventListener('click', () => {
        const wasDone = el.classList.contains('done');
        el.classList.toggle('done');
        doneCount += wasDone ? -1 : 1;
        updateProgress();
        if (!wasDone) burst(el);
      });

      list.appendChild(el);
    });

    /* ── Burst de particules ── */
    function burst(el) {
      const rect = el.getBoundingClientRect();
      const syms = ['✦','⭐','✩','◆','🌟','✧'];
      const cols = ['#f0d080','#c9a84c','#5dd87d','#ffffff','#ff88dd'];
      for (let k = 0; k < 10; k++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = syms[Math.floor(Math.random() * syms.length)];
        p.style.color = cols[Math.floor(Math.random() * cols.length)];
        p.style.left  = (rect.left + rect.width / 2 + (Math.random() * 100 - 50)) + 'px';
        p.style.top   = (rect.top + rect.height / 2) + 'px';
        p.style.setProperty('--dx', (Math.random() * 140 - 70) + 'px');
        p.style.fontSize = (Math.random() * 11 + 9) + 'px';
        p.style.animationDuration = (1.6 + Math.random() * 2) + 's';
        document.body.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    /* ── Particules ambiantes ── */
    const pSym = ['✦','✧','⋆','·'];
    const pCol = ['#c9a84c','#f0d080','#fff'];
    setInterval(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = pSym[Math.floor(Math.random() * pSym.length)];
      p.style.color = pCol[Math.floor(Math.random() * pCol.length)];
      p.style.left  = (Math.random() * 100) + 'vw';
      p.style.top   = '96dvh';
      p.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
      p.style.fontSize = (Math.random() * 9 + 7) + 'px';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }, window.innerWidth < 600 ? 2200 : 1400);
  </script>

</body>
</html>
