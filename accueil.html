<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Joyeux Anniversaire 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #8a6820;
      --deep:        #0a0a14;
      --navy2:       #112240;
      --surface2:    #1e2d45;
      --sidebar-w:   260px;
      --navbar-h:    64px;
      --text:        #eee8d8;
      --text-dim:    #9aaac0;
      --radius:      12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Fond étoilé ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 15%, rgba(30,50,100,0.75) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 80% 85%, rgba(50,25,80,0.65) 0%, transparent 65%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1.5px 1.5px at  6% 10%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 20% 35%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(2px   2px   at 36%  6%, rgba(255,255,255,0.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 53% 22%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 68% 47%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(2px   2px   at 81% 16%, rgba(255,255,255,0.80) 0%, transparent 100%),
        radial-gradient(1px   1px   at 90% 65%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(1px   1px   at 10% 70%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 46% 80%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px   1px   at 28% 55%, rgba(201,168,76,0.50)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 76%, rgba(201,168,76,0.40)  0%, transparent 100%),
        radial-gradient(1px   1px   at 75% 33%, rgba(180,200,255,0.35) 0%, transparent 100%),
        radial-gradient(1px   1px   at 42% 18%, rgba(255,255,255,0.50) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 44%, rgba(201,168,76,0.35)  0%, transparent 100%);
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift { to { transform: translateY(-10px) translateX(6px); } }

    /* ══════════════════════════════
       NAVBAR
    ══════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-h);
      z-index: 200;
      background: linear-gradient(90deg, rgba(10,10,20,0.95), rgba(17,34,64,0.95));
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 16px;
    }
    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1; box-shadow: 0 0 18px var(--gold); }
    }
    @keyframes heartBeat {
      0%,100% { transform: scale(1); }
      15%      { transform: scale(1.28); }
      30%      { transform: scale(1); }
      45%      { transform: scale(1.15); }
      60%      { transform: scale(1); }
    }

    .navbar-left {
      display: flex; align-items: center; justify-content: flex-start;
    }
    .navbar-brand {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.1rem, 3vw, 2.2rem);
      font-weight: 400;
      background: linear-gradient(135deg, #ffffff 0%, var(--gold-light) 40%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
      letter-spacing: 1px;
      white-space: nowrap;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .navbar-right {}

    /* ── Hamburger ── */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px;
      background: none; border: none; flex-shrink: 0;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--gold); border-radius: 2px; transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    @media (max-width: 768px) { .hamburger { display: flex; } }

    /* ══════════════════════════════
       LAYOUT
    ══════════════════════════════ */
    .layout {
      display: flex; flex: 1;
      margin-top: var(--navbar-h);
      height: calc(100dvh - var(--navbar-h));
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      height: 100%; overflow-y: auto; overflow-x: hidden;
      background: linear-gradient(180deg, rgba(10,10,20,0.97), rgba(15,20,40,0.97));
      border-right: 1px solid rgba(201,168,76,0.18);
      backdrop-filter: blur(12px);
      padding: 28px 14px 40px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin; scrollbar-color: var(--gold-dim) transparent;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 150;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: var(--navbar-h); left: 0;
        height: calc(100dvh - var(--navbar-h));
        transform: translateX(-100%);
        width: min(var(--sidebar-w), 80vw);
      }
      .sidebar.open { transform: translateX(0); }
    }

    .sidebar-section {
      font-size: 0.58rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold-dim);
      padding: 14px 10px 6px;
      border-top: 1px solid rgba(201,168,76,0.1);
      margin-top: 6px;
    }
    .sidebar-section:first-child { border-top: none; margin-top: 0; padding-top: 0; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius);
      text-decoration: none; color: var(--text-dim);
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px;
      transition: all 0.25s ease; position: relative;
      border: 1px solid transparent;
    }
    .nav-item:hover {
      background: rgba(201,168,76,0.08);
      border-color: rgba(201,168,76,0.2);
      color: var(--text); transform: translateX(3px);
    }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border-color: rgba(201,168,76,0.35); color: var(--gold-light);
    }
    .nav-item.active::before {
      content: ''; position: absolute;
      left: 0; top: 20%; bottom: 20%; width: 3px;
      background: linear-gradient(180deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }
    .nav-icon { font-size: 1.1rem; flex-shrink: 0; width: 22px; text-align: center; }
    .nav-label { flex: 1; }
    .nav-badge {
      font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      color: var(--deep); border-radius: 20px; padding: 2px 7px; font-weight: 700;
    }

    /* ── CONTENU PRINCIPAL ── */
    .main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      display: flex; align-items: flex-start; justify-content: center;
      padding: clamp(24px, 4vw, 50px) clamp(16px, 4vw, 60px) 80px;
      scrollbar-width: thin; scrollbar-color: var(--gold-dim) transparent;
    }

    .message-card {
      max-width: 680px; width: 100%;
      text-align: left;
      animation: fadeIn 1s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.2vw, 1.38rem);
      font-weight: 300; line-height: 2;
      color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      position: relative;
    }

    .cursor {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--gold-light); margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.75s step-start infinite;
      border-radius: 1px; box-shadow: 0 0 6px var(--gold);
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor.done { display: none; }

    .gold-w { color: var(--gold-light); font-style: italic; }

    .gold-divider {
      width: clamp(80px, 18vw, 140px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(18px, 3vh, 28px) auto 0;
      opacity: 0; transition: opacity 1s ease;
    }
    .gold-divider.show { opacity: 1; }

    /* Overlay mobile */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 140;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 400px) {
      :root { --navbar-h: 54px; }
      .navbar-brand { font-size: 1rem; }
      .message-body { font-size: 0.96rem; line-height: 1.85; }
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="navbar-left">
      <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <span class="navbar-brand">
      Joyeux Anniversaire Mon Meilleur
      <svg style="display:inline-block;vertical-align:middle;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(201,168,76,0.8));animation:heartBeat 2s ease-in-out infinite;"
           width="22" height="20" viewBox="0 0 38 34" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#f0d080"/>
            <stop offset="50%"  stop-color="#c9a84c"/>
            <stop offset="100%" stop-color="#8a6820"/>
          </linearGradient>
        </defs>
        <path d="M19 31 C19 31 2 20 2 10.5 C2 6 5.5 2.5 10 2.5 C13.5 2.5 16.5 4.5 19 7.5 C21.5 4.5 24.5 2.5 28 2.5 C32.5 2.5 36 6 36 10.5 C36 20 19 31 19 31Z" fill="url(#hg)"/>
      </svg>
    </span>

    <div class="navbar-right"></div>
  </nav>

  <!-- ── LAYOUT ── -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

      <div class="sidebar-section">✦ &nbsp; A savoir</div>

      <a href="qualites_25.html" class="nav-item">
        <span class="nav-icon">✨</span>
        <span class="nav-label">25 Reasons</span>
      </a>
      <a href="letter.html" class="nav-item">
        <span class="nav-icon">💌</span>
        <span class="nav-label">Letter</span>
      </a>
      <a href="wishes.html" class="nav-item">
        <span class="nav-icon">🌠</span>
        <span class="nav-label">Wishes</span>
      </a>

      <div class="sidebar-section">✦ &nbsp; Nos Souvenirs</div>

      <a href="memories.html" class="nav-item">
        <span class="nav-icon">📸</span>
        <span class="nav-label">Memories</span>
      </a>
      <a href="timeline.html" class="nav-item">
        <span class="nav-icon">⏳</span>
        <span class="nav-label">Our Story</span>
      </a>
      <a href="cadeau.html" class="nav-item">
        <span class="nav-icon">🎁</span>
        <span class="nav-label">Cadeau</span>
      </a>

      <div class="sidebar-section">✦ &nbsp; Pour Toujours</div>

      <a href="music.html" class="nav-item">
        <span class="nav-icon">🎶</span>
        <span class="nav-label">Our Music</span>
      </a>
      <a href="bucket.html" class="nav-item">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Bucket List</span>
      </a>
      <a href="quiz.html" class="nav-item">
        <span class="nav-icon">🎮</span>
        <span class="nav-label">Notre Quiz</span>
      </a>

      <div style="margin-top:auto;padding-top:20px;border-top:1px solid rgba(201,168,76,0.12);">
        <a href="index.html" class="nav-item" style="color:#e07070;border-color:transparent;"
           onmouseover="this.style.background='rgba(224,112,112,0.1)';this.style.borderColor='rgba(224,112,112,0.3)'"
           onmouseout="this.style.background='';this.style.borderColor='transparent'">
          <span class="nav-icon">🔓</span>
          <span class="nav-label">Déconnexion</span>
        </a>
      </div>

    </div>

    <!-- Overlay mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- CONTENU PRINCIPAL -->
    <main class="main">
      <div class="message-card">
        <div class="message-body" id="messageBody"><span class="cursor" id="cursor"></span></div>
        <div class="gold-divider" id="divider"></div>
      </div>
    </main>

  </div>

  <script>
    const segments = [
      { text: "Je sais que tu n'es pas fan des anniversaires…\nMais aujourd'hui, je tiens vraiment à rendre cette journée ", speed: 50 },
      { text: "spéciale,", gold: true, speed: 68 },
      { text: " tout comme tu l'es pour moi.\n\n", speed: 48 },

      { text: "Tu comptes parmi ces rares personnes qui me sont ", speed: 48 },
      { text: "précieuses,", gold: true, speed: 68 },
      { text: " celles qu'on garde précieusement dans un coin du cœur.\n\n", speed: 48 },

      { text: "Tu as toujours été ce support émotionnel pour moi,\ntoujours présent pendant les moments obscurs,\napportant ainsi une lueur d'espoir, de joie\net de paix dans ma vie.\n\n", speed: 46 },

      { text: "Tu es cet ami dont ", speed: 48 },
      { text: "tout le monde rêverait d'avoir.", gold: true, speed: 65 },
      { text: "\nCe genre de personne bienveillante\nqui répand la bonne humeur autour d'elle.\n\n", speed: 46 },

      { text: "Merci d'être celui qui m'écoute\ntoujours sans jamais se lasser.\nSache que ta présence dans ma vie m'est trop ", speed: 48 },
      { text: "précieuse.", gold: true, speed: 65 },
      { text: "\n\n", speed: 30 },

      { text: "Joyeux anniversaire mon meilleur ", gold: true, speed: 72 },
      { text: "❤️\n", speed: 55 },
      { text: "Que tes 25 ans ouvrent la porte à une année remplie\nde tout ce que tu mérites \net ", speed: 48 },
      { text: "tu mérites tout le bonheur du monde.", gold: true, speed: 65 },
      { text: "\n\n", speed: 30 },

      { text: "Yalnala yallah sameu, aar leu,\ndolil la soutoura, tawfekh tei mou\nmayla lepp loy yotou tei mou gueune si ioe.\n\n", speed: 52 },

      { text: "Un quart de siècle sur nous ? ", speed: 48 },
      { text: "Excuse nous le vieux 😄", gold: true, speed: 65 },
    ];

    const bodyEl   = document.getElementById('messageBody');
    const cursorEl = document.getElementById('cursor');
    const divider  = document.getElementById('divider');

    function typeSegments(segs, segIdx, charIdx) {
      if (segIdx >= segs.length) {
        cursorEl.classList.add('done');
        divider.classList.add('show');
        return;
      }
      const seg  = segs[segIdx];
      const text = seg.text;
      if (charIdx >= text.length) { typeSegments(segs, segIdx + 1, 0); return; }

      const ch = text[charIdx];
      let spanId = 'seg-' + segIdx;
      let span   = document.getElementById(spanId);
      if (!span) {
        span = document.createElement('span');
        span.id = spanId;
        if (seg.gold) span.className = 'gold-w';
        bodyEl.insertBefore(span, cursorEl);
      }
      ch === '\n' ? span.appendChild(document.createElement('br')) : span.appendChild(document.createTextNode(ch));

      const main = document.querySelector('.main');
      if (main) main.scrollTop = main.scrollHeight;

      let delay = seg.speed || 52;
      if ('.!?…'.includes(ch))  delay += 180 + Math.random() * 120;
      else if (',;:'.includes(ch)) delay += 80  + Math.random() * 60;
      else if (ch === '\n')        delay += 120;
      else                         delay += Math.random() * 28 - 10;
      delay = Math.max(18, delay);

      setTimeout(() => typeSegments(segs, segIdx, charIdx + 1), delay);
    }

    setTimeout(() => typeSegments(segments, 0, 0), 1000);

    /* Sidebar mobile */
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');
    const hamburger = document.getElementById('hamburger');

    function toggleSidebar() {
      const open = sidebar.classList.toggle('open');
      overlay.classList.toggle('show', open);
      hamburger.classList.toggle('open', open);
    }
  </script>

</body>
