<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notre Quiz 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #8a6820;
      --deep:        #0a0a14;
      --navy2:       #112240;
      --surface2:    #1e2d45;
      --text:        #eee8d8;
      --text-dim:    #9aaac0;
      --green:       #4caf6e;
      --red:         #e05555;
      --radius:      16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(68px, 10dvh, 100px) clamp(12px, 4vw, 28px) 70px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Fond étoilé ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 15%, rgba(30,50,100,0.75) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 80% 85%, rgba(50,25,80,0.65) 0%, transparent 65%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1.5px 1.5px at  6% 10%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 20% 35%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(2px   2px   at 36%  6%, rgba(255,255,255,0.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 53% 22%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 68% 47%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(2px   2px   at 81% 16%, rgba(255,255,255,0.80) 0%, transparent 100%),
        radial-gradient(1px   1px   at 46% 80%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px   1px   at 28% 55%, rgba(201,168,76,0.50)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 76%, rgba(201,168,76,0.40)  0%, transparent 100%);
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift { to { transform: translateY(-10px) translateX(6px); } }

    /* ── Barre dorée ── */
    .deco-line {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 99;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow { 0%,100% { opacity: .75; } 50% { opacity: 1; box-shadow: 0 0 22px var(--gold); } }

    /* ── Retour ── */
    .retour {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      padding: 6px 14px;
      border: 1px solid var(--gold-dim); border-radius: 30px;
      background: rgba(20,24,42,0.8); color: var(--gold-light);
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; backdrop-filter: blur(10px); transition: all .3s;
    }
    .retour:hover { background: var(--gold-dim); color: #fff; transform: translateX(-3px); }

    /* ══════════════════════════
       HEADER
    ══════════════════════════ */
    .header {
      text-align: center;
      margin-bottom: clamp(20px, 3.5dvh, 36px);
      animation: fadeDown 1s ease both;
      width: 100%;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .header-icon {
      font-size: clamp(2rem, 6vw, 3.2rem);
      display: block; margin-bottom: 10px;
      filter: drop-shadow(0 0 14px rgba(201,168,76,.6));
      animation: iconBounce 2s ease-in-out infinite;
    }
    @keyframes iconBounce {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-8px) rotate(5deg); }
    }
    .header-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 18px rgba(201,168,76,.45));
      line-height: 1.1;
    }
    .gold-divider {
      width: clamp(80px, 16vw, 130px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(8px, 1.5dvh, 14px) auto;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1.1rem); color: var(--text-dim);
    }

    /* ══════════════════════════
       ZONE DE JEU
    ══════════════════════════ */
    .game-wrap {
      width: 100%;
      max-width: 600px;
      animation: fadeDown 1s ease 0.2s both;
    }

    /* ── Barre de progression ── */
    .progress-wrap {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: clamp(16px, 3dvh, 24px);
    }
    .progress-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.58rem, 1.2vw, 0.7rem);
      letter-spacing: 2.5px; color: var(--gold);
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .progress-track {
      flex: 1; height: 5px; border-radius: 3px;
      background: rgba(201,168,76,0.12);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
      width: 0%;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--gold);
    }
    .progress-score {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.58rem, 1.2vw, 0.7rem);
      letter-spacing: 2px; color: var(--gold-light);
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Carte question ── */
    .question-card {
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      padding: clamp(22px, 4vw, 36px) clamp(18px, 4vw, 32px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    /* Glow subtil dans le coin */
    .question-card::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
      pointer-events: none;
    }

    .question-card.exit {
      opacity: 0;
      transform: translateY(-12px) scale(0.97);
    }
    .question-card.enter {
      animation: cardEnter 0.4s ease both;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Numéro + question */
    .q-meta {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: clamp(14px, 2.5dvh, 20px);
    }
    .q-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.55rem, 1.1vw, 0.65rem);
      letter-spacing: 3px; color: var(--gold-dim);
      text-transform: uppercase; flex-shrink: 0;
    }
    .q-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent);
    }
    .q-icon {
      font-size: clamp(1.4rem, 3.5vw, 1.9rem);
      filter: drop-shadow(0 0 6px rgba(201,168,76,.4));
    }

    .question-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 400; line-height: 1.55;
      color: var(--text);
      margin-bottom: clamp(18px, 3dvh, 28px);
    }

    /* ── Options ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 2vw, 14px);
    }
    .option-btn {
      background: rgba(30,45,69,0.7);
      border: 1.5px solid rgba(201,168,76,0.22);
      border-radius: 10px;
      padding: clamp(12px, 2.5vw, 18px) clamp(12px, 2.5vw, 16px);
      cursor: pointer;
      text-align: left;
      transition: all 0.22s ease;
      display: flex; align-items: flex-start; gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .option-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.07), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .option-btn:hover:not(:disabled)::before { opacity: 1; }
    .option-btn:hover:not(:disabled) {
      border-color: rgba(201,168,76,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .option-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }

    .option-letter {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.2vw, 0.72rem);
      color: var(--gold-dim);
      letter-spacing: 1px;
      flex-shrink: 0;
      padding-top: 2px;
      transition: color .2s;
    }
    .option-text {
      font-size: clamp(0.82rem, 1.9vw, 0.96rem);
      color: var(--text-dim);
      line-height: 1.4;
      transition: color .2s;
    }

    /* États après réponse */
    .option-btn.correct {
      background: rgba(76,175,110,0.18);
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(76,175,110,0.25);
      transform: none;
    }
    .option-btn.correct .option-letter,
    .option-btn.correct .option-text { color: #6ddf8e; }

    .option-btn.wrong {
      background: rgba(224,85,85,0.15);
      border-color: var(--red);
      box-shadow: 0 0 14px rgba(224,85,85,0.2);
      transform: none;
    }
    .option-btn.wrong .option-letter,
    .option-btn.wrong .option-text { color: #f08080; }

    .option-btn.disabled-neutral {
      opacity: 0.4;
      cursor: default;
    }
    .option-btn:disabled { cursor: default; }

    /* Feedback rapide */
    .feedback-bar {
      margin-top: clamp(14px, 2.5dvh, 20px);
      min-height: 32px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.88rem, 2.2vw, 1.05rem);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .feedback-bar.show { opacity: 1; }
    .feedback-bar.ok  { color: #6ddf8e; }
    .feedback-bar.ko  { color: #f08080; }
    .feedback-icon { font-size: clamp(1.1rem, 2.5vw, 1.4rem); flex-shrink: 0; }

    /* ── Bouton suivant ── */
    .btn-next {
      display: block; width: 100%;
      margin-top: clamp(16px, 3dvh, 24px);
      padding: clamp(12px, 2dvh, 16px) 24px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-light));
      border: none; border-radius: 10px;
      color: #1a0f00;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 18px rgba(201,168,76,0.3);
    }
    .btn-next.visible { opacity: 1; pointer-events: all; }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.45); }
    .btn-next:active { transform: translateY(0); }

    /* ══════════════════════════
       ÉCRAN RÉSULTATS
    ══════════════════════════ */
    .results-card {
      display: none;
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      padding: clamp(28px, 5vw, 48px) clamp(20px, 5vw, 40px);
      text-align: center;
      box-shadow: 0 12px 50px rgba(0,0,0,0.55);
      animation: cardEnter 0.6s ease both;
    }
    .results-card.show { display: block; }

    .result-trophy {
      font-size: clamp(3rem, 10vw, 5rem);
      display: block; margin-bottom: 12px;
      animation: trophyBounce 1s ease 0.3s both;
      filter: drop-shadow(0 0 20px rgba(201,168,76,.7));
    }
    @keyframes trophyBounce {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .result-score-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.3vw, 0.72rem);
      letter-spacing: 4px; color: var(--gold-dim);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .result-score-big {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 10vw, 5.5rem);
      background: linear-gradient(135deg, #fff, var(--gold-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 20px rgba(201,168,76,.5));
      line-height: 1;
      display: block; margin-bottom: 6px;
      animation: fadeDown 0.6s ease 0.5s both;
    }

    .result-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 3.5vw, 1.7rem);
      font-weight: 600; color: var(--text);
      margin-bottom: 10px;
      animation: fadeDown 0.6s ease 0.65s both;
    }
    .result-msg {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.9rem, 2.2vw, 1.1rem);
      color: var(--text-dim); line-height: 1.75;
      margin-bottom: clamp(20px, 4dvh, 32px);
      animation: fadeDown 0.6s ease 0.8s both;
    }
    .result-msg .gold-w { color: var(--gold-light); font-style: normal; }

    /* Barre score visuelle */
    .result-bar-wrap {
      margin: 0 auto clamp(20px, 4dvh, 30px);
      max-width: 320px;
      animation: fadeDown 0.6s ease 0.9s both;
    }
    .result-bar-bg {
      height: 8px; border-radius: 4px;
      background: rgba(201,168,76,0.12);
      overflow: hidden; margin-bottom: 6px;
    }
    .result-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
      width: 0%; transition: width 1.2s cubic-bezier(.4,0,.2,1) 1s;
      box-shadow: 0 0 10px var(--gold);
    }
    .result-bar-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.58rem, 1.1vw, 0.68rem);
      letter-spacing: 2px; color: var(--gold-dim);
    }

    /* Détail des réponses */
    .answers-recap {
      text-align: left;
      margin-bottom: clamp(20px, 4dvh, 30px);
      display: flex; flex-direction: column; gap: 8px;
      animation: fadeDown 0.6s ease 1s both;
    }
    .recap-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: clamp(0.8rem, 1.8vw, 0.9rem);
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,0.2);
    }
    .recap-item.ok { border-left: 3px solid var(--green); }
    .recap-item.ko { border-left: 3px solid var(--red); }
    .recap-check { flex-shrink: 0; font-size: 1rem; }
    .recap-q { color: var(--text-dim); font-style: italic; flex: 1; line-height: 1.4; }
    .recap-q strong { color: var(--text); font-style: normal; }

    /* Bouton rejouer */
    .btn-replay {
      display: inline-block;
      padding: clamp(12px, 2dvh, 16px) clamp(24px, 5vw, 40px);
      background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-light));
      border: none; border-radius: 10px;
      color: #1a0f00;
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 1.5vw, 0.82rem);
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(201,168,76,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fadeDown 0.6s ease 1.1s both;
    }
    .btn-replay:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }

    /* ── Particules ── */
    .particle {
      position: fixed; pointer-events: none; z-index: 50;
      animation: partFloat linear forwards;
    }
    @keyframes partFloat {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: .9; }
      100% { transform: translateY(-90dvh) translateX(var(--dx,20px)) rotate(360deg); opacity: 0; }
    }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media (max-width: 480px) {
      .options-grid { grid-template-columns: 1fr; }
      .option-btn { padding: 13px 14px; }
    }
    @media (max-width: 360px) {
      body { padding-left: 8px; padding-right: 8px; }
      .header-title { font-size: 2.1rem; }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <a href="accueil.html" class="retour">← Retour</a>

  <header class="header">
    <span class="header-icon">🎮</span>
    <h1 class="header-title">Notre Quiz</h1>
    <div class="gold-divider"></div>
    <p class="header-sub">Tu me connais vraiment ? Prouve-le 😏</p>
  </header>

  <div class="game-wrap">

    <!-- Barre de progression -->
    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">Question 1 / 10</span>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-score" id="progressScore">0 ✦</span>
    </div>

    <!-- Carte question -->
    <div class="question-card" id="questionCard">
      <div class="q-meta">
        <span class="q-num" id="qNum">01</span>
        <span class="q-line"></span>
        <span class="q-icon" id="qIcon">✨</span>
      </div>
      <p class="question-text" id="questionText">…</p>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="feedback-bar" id="feedbackBar">
        <span class="feedback-icon" id="feedbackIcon"></span>
        <span id="feedbackText"></span>
      </div>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <!-- Résultats -->
    <div class="results-card" id="resultsCard">
      <span class="result-trophy" id="resultTrophy">🏆</span>
      <p class="result-score-label">Ton score</p>
      <span class="result-score-big" id="resultScoreBig">0/10</span>
      <p class="result-title" id="resultTitle">…</p>
      <p class="result-msg" id="resultMsg">…</p>
      <div class="result-bar-wrap">
        <div class="result-bar-bg"><div class="result-bar-fill" id="resultBarFill"></div></div>
        <p class="result-bar-label" id="resultBarLabel"></p>
      </div>
      <div class="answers-recap" id="answersRecap"></div>
      <button class="btn-replay" onclick="restartQuiz()">🔄 &nbsp; Rejouer</button>
    </div>

  </div>

  <script>
    /* ══════════════════════════════════════════
       QUESTIONS
    ══════════════════════════════════════════ */
    const QUESTIONS = [
      {
        icon: '🌅',
        text: 'À quelle heure Poulmera enverrait un message "tu dors ?" alors qu\'elle sait très bien que tu ne dors pas ?',
        options: ['23h pile', '2h du matin', 'Minuit et demi', '4h du mat'],
        correct: 1,
        feedbackOk: 'Exactement, même les nuits ont leurs règles 😅',
        feedbackKo: '2h du mat… l\'heure des grandes révélations.',
      },
      {
        icon: '💬',
        text: 'Quelle est la phrase que Poulmera utilise le plus quand elle est contrariée ?',
        options: ['"Anh d\'accord je vois"', '"Laisse tomber"', '"C\'est bon"', '"Peu importe"'],
        correct: 0,
        feedbackOk: '"Anh d\'accord je vois"… traduction : elle a tout compris et elle est pas contente 😂',
        feedbackKo: 'C\'est "Anh d\'accord je vois" — le silence éloquent de Poulmera.',
      },
      {
        icon: '🎵',
        text: 'Quelle playlist lance Poulmera quand elle est dans ses émotions ?',
        options: ['Rap français', 'RnB doux', 'Afrobeats', 'Pop triste'],
        correct: 1,
        feedbackOk: 'Le RnB qui accompagne chaque sentiment 💙',
        feedbackKo: 'C\'est le RnB doux… pour ressentir encore plus fort.',
      },
      {
        icon: '🤫',
        text: 'Quand Poulmera dit "j\'arrive dans 5 min", ça veut dire…',
        options: ['5 minutes chrono', '15 à 20 minutes', '1 heure minimum', 'Elle est déjà là en fait'],
        correct: 1,
        feedbackOk: 'La ponctualité, c\'est relatif 😭',
        feedbackKo: '15-20 min minimum, tu devrais savoir ça maintenant.',
      },
      {
        icon: '💙',
        text: 'Comment Poulmera montre-t-elle qu\'elle tient à quelqu\'un sans le dire directement ?',
        options: ['Elle envoie des memes', 'Elle check silencieusement', 'Elle cuisine pour eux', 'Elle envoie des audios longs'],
        correct: 1,
        feedbackOk: 'Elle check en silence, mais elle est toujours là 💙',
        feedbackKo: 'Elle check en silence. Discrète mais présente.',
      },
      {
        icon: '😤',
        text: 'Quand Poulmera est en colère contre toi mais ne veut pas le montrer, elle fait quoi ?',
        options: ['Elle crie', 'Elle répond en monosyllabe', 'Elle fait semblant que tout va bien', 'Elle envoie un long message'],
        correct: 1,
        feedbackOk: 'Les "ok", "bien", "ah"… chaque monosyllabe dit tout 😂',
        feedbackKo: 'Elle répond en monosyllabe. Court, froid, éloquent.',
      },
      {
        icon: '🍗',
        text: 'Le plat que Poulmera peut manger à n\'importe quelle heure du jour ou de la nuit ?',
        options: ['Du riz au poisson', 'Du thiéboudiène', 'Des tacos', 'Du poulet'],
        correct: 3,
        feedbackOk: 'Du poulet, à toute heure, sans jamais se lasser 😂',
        feedbackKo: 'Du poulet. Toujours du poulet. En toutes circonstances.',
      },
      {
        icon: '✨',
        text: 'Quelle phrase résume le mieux la relation entre vous deux ?',
        options: [
          '"On s\'aime trop pour se détester vraiment"',
          '"On se déteste trop pour se séparer"',
          '"Amis pour toujours, ennemis parfois"',
          '"Compliqués mais indispensables l\'un à l\'autre"'
        ],
        correct: 3,
        feedbackOk: 'Compliqués, mais indispensables. C\'est ça exactement 💙',
        feedbackKo: 'La bonne réponse : compliqués mais indispensables l\'un à l\'autre.',
      },
      {
        icon: '🌙',
        text: 'À quel moment Poulmera est la plus bavarde ?',
        options: ['Le matin au réveil', 'L\'après-midi', 'La nuit passé 23h', 'Quand elle s\'ennuie'],
        correct: 3,
        feedbackOk: 'Quand elle s\'ennuie, les messages n\'ont plus de fin 😂',
        feedbackKo: 'C\'est quand elle s\'ennuie — là elle devient vraiment intarissable.',
      },
      {
        icon: '🏆',
        text: 'Si Poulmera devait choisir un seul mot pour te décrire, ce serait…',
        options: ['"Indispensable"', '"Insupportable"', '"Les deux à la fois"', '"Mon meilleur"'],
        correct: 3,
        feedbackOk: 'Son meilleur. Tout simplement 💙',
        feedbackKo: 'La réponse était "Mon meilleur". Tu l\'es, quand même.',
      },
    ];

    /* ══════════════════════════════════════════
       ÉTAT DU JEU
    ══════════════════════════════════════════ */
    let currentQ   = 0;
    let score      = 0;
    let answered   = false;
    let history    = []; // { correct: bool, questionText, correctAnswer }

    const LETTERS = ['A', 'B', 'C', 'D'];

    /* ══════════════════════════════════════════
       RENDU D'UNE QUESTION
    ══════════════════════════════════════════ */
    function renderQuestion(index) {
      const q = QUESTIONS[index];
      answered = false;

      document.getElementById('qNum').textContent = String(index + 1).padStart(2, '0');
      document.getElementById('qIcon').textContent = q.icon;
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('progressLabel').textContent = `Question ${index + 1} / ${QUESTIONS.length}`;
      document.getElementById('progressFill').style.width  = ((index / QUESTIONS.length) * 100) + '%';
      document.getElementById('progressScore').textContent = score + ' ✦';

      // Feedback reset
      const fb = document.getElementById('feedbackBar');
      fb.className = 'feedback-bar';
      document.getElementById('feedbackText').textContent = '';
      document.getElementById('feedbackIcon').textContent = '';

      // Bouton suivant reset
      const btnNext = document.getElementById('btnNext');
      btnNext.className = 'btn-next';
      btnNext.textContent = index < QUESTIONS.length - 1 ? 'Question suivante →' : 'Voir mes résultats 🏆';

      // Options
      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${LETTERS[i]}</span><span class="option-text">${opt}</span>`;
        btn.addEventListener('click', () => selectAnswer(i, q));
        grid.appendChild(btn);
      });
    }

    /* ══════════════════════════════════════════
       SÉLECTION D'UNE RÉPONSE
    ══════════════════════════════════════════ */
    function selectAnswer(selectedIndex, q) {
      if (answered) return;
      answered = true;

      const btns = document.querySelectorAll('.option-btn');
      const isCorrect = selectedIndex === q.correct;

      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) {
          btn.classList.add('correct');
        } else if (i === selectedIndex && !isCorrect) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('disabled-neutral');
        }
      });

      // Score
      if (isCorrect) {
        score++;
        document.getElementById('progressScore').textContent = score + ' ✦';
        burst();
      }

      // Feedback
      const fb = document.getElementById('feedbackBar');
      document.getElementById('feedbackIcon').textContent = isCorrect ? '✅' : '❌';
      document.getElementById('feedbackText').textContent  = isCorrect ? q.feedbackOk : q.feedbackKo;
      fb.className = 'feedback-bar show ' + (isCorrect ? 'ok' : 'ko');

      // Bouton suivant
      setTimeout(() => {
        document.getElementById('btnNext').classList.add('visible');
      }, 400);

      // Historique
      history.push({
        correct: isCorrect,
        questionText: q.text.length > 55 ? q.text.slice(0, 55) + '…' : q.text,
        correctAnswer: q.options[q.correct],
      });
    }

    /* ══════════════════════════════════════════
       QUESTION SUIVANTE
    ══════════════════════════════════════════ */
    function nextQuestion() {
      const card = document.getElementById('questionCard');
      card.classList.add('exit');
      setTimeout(() => {
        currentQ++;
        if (currentQ >= QUESTIONS.length) {
          showResults();
        } else {
          renderQuestion(currentQ);
          card.classList.remove('exit');
          card.classList.add('enter');
          setTimeout(() => card.classList.remove('enter'), 400);
        }
      }, 280);
    }

    /* ══════════════════════════════════════════
       RÉSULTATS
    ══════════════════════════════════════════ */
    function showResults() {
      document.getElementById('questionCard').style.display = 'none';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = `Quiz terminé !`;

      const pct    = score / QUESTIONS.length;
      const rc     = document.getElementById('resultsCard');
      rc.classList.add('show');

      document.getElementById('resultScoreBig').textContent = `${score}/${QUESTIONS.length}`;

      // Trophée + titre + message selon score
      let trophy, title, msg;
      if (pct === 1) {
        trophy = '🏆'; title = 'Parfait !';
        msg = 'Tu me connais <span class="gold-w">mieux que je ne me connais moi-même</span>.<br>C\'est un peu effrayant, beaucoup touchant.';
      } else if (pct >= 0.8) {
        trophy = '🥇'; title = 'Impressionnant !';
        msg = 'Tu fais vraiment attention. <span class="gold-w">À moi, à nous, à tout.</span><br>Et ça, ça ne s\'oublie pas.';
      } else if (pct >= 0.6) {
        trophy = '🥈'; title = 'Pas mal du tout !';
        msg = 'Tu me connais bien, mais <span class="gold-w">il reste encore des mystères à découvrir</span>.<br>Et c\'est très bien comme ça.';
      } else if (pct >= 0.4) {
        trophy = '🥉'; title = 'Peut mieux faire…';
        msg = 'Humm. On a encore du chemin à faire.<br>Ou peut-être que <span class="gold-w">tu fais exprès pour avoir une excuse de me revoir</span> 😏';
      } else {
        trophy = '😅'; title = 'Sérieusement ?';
        msg = 'On se connaît depuis tout ce temps et c\'est tout ?<br><span class="gold-w">Je suis blessée.</span> (Mais je t\'aime quand même.)';
      }

      document.getElementById('resultTrophy').textContent = trophy;
      document.getElementById('resultTitle').textContent  = title;
      document.getElementById('resultMsg').innerHTML      = msg;
      document.getElementById('resultBarLabel').textContent = `${Math.round(pct * 100)}% de bonnes réponses`;

      setTimeout(() => {
        document.getElementById('resultBarFill').style.width = (pct * 100) + '%';
      }, 200);

      // Récap
      const recap = document.getElementById('answersRecap');
      recap.innerHTML = '';
      history.forEach(h => {
        const div = document.createElement('div');
        div.className = 'recap-item ' + (h.correct ? 'ok' : 'ko');
        div.innerHTML = `
          <span class="recap-check">${h.correct ? '✅' : '❌'}</span>
          <span class="recap-q">${h.questionText}<br><strong>→ ${h.correctAnswer}</strong></span>`;
        recap.appendChild(div);
      });

      // Confettis si bon score
      if (pct >= 0.6) {
        for (let i = 0; i < 60; i++) setTimeout(spawnConfetti, i * 40);
      }
    }

    /* ══════════════════════════════════════════
       REJOUER
    ══════════════════════════════════════════ */
    function restartQuiz() {
      currentQ = 0; score = 0; history = [];
      document.getElementById('resultsCard').classList.remove('show');
      document.getElementById('questionCard').style.display = '';
      document.getElementById('progressScore').textContent = '0 ✦';
      renderQuestion(0);
    }

    /* ══════════════════════════════════════════
       EFFETS VISUELS
    ══════════════════════════════════════════ */
    function burst() {
      const syms = ['✦','⭐','✩','◆','💙'];
      const cols = ['#f0d080','#c9a84c','#ffffff','#6ddf8e'];
      for (let k = 0; k < 10; k++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'particle';
          p.textContent = syms[Math.floor(Math.random() * syms.length)];
          p.style.color = cols[Math.floor(Math.random() * cols.length)];
          p.style.left  = (20 + Math.random() * 60) + 'vw';
          p.style.top   = '55dvh';
          p.style.setProperty('--dx', (Math.random() * 140 - 70) + 'px');
          p.style.fontSize = (Math.random() * 12 + 9) + 'px';
          p.style.animationDuration = (1.6 + Math.random() * 1.8) + 's';
          document.body.appendChild(p);
          p.addEventListener('animationend', () => p.remove());
        }, k * 60);
      }
    }

    const confColors = ['#ff4444','#ffdd57','#44bbff','#44ff88','#ff88dd','#f0d080','#fff'];
    function spawnConfetti() {
      const c = document.createElement('div');
      c.className = 'particle';
      const s = Math.random() * 9 + 6;
      c.style.width  = s + 'px'; c.style.height = (s * 0.5) + 'px';
      c.style.background = confColors[Math.floor(Math.random() * confColors.length)];
      c.style.borderRadius = '2px';
      c.style.left  = (Math.random() * 100) + 'vw';
      c.style.top   = '-4dvh';
      c.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
      c.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }

    /* Particules ambiantes */
    const pSym = ['✦','✧','⋆','·'];
    const pCol = ['#c9a84c','#f0d080','#fff'];
    setInterval(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = pSym[Math.floor(Math.random() * pSym.length)];
      p.style.color = pCol[Math.floor(Math.random() * pCol.length)];
      p.style.left  = (Math.random() * 100) + 'vw';
      p.style.top   = '96dvh';
      p.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
      p.style.fontSize = (Math.random() * 8 + 7) + 'px';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }, window.innerWidth < 600 ? 2200 : 1500);

    /* ── Init ── */
    renderQuestion(0);
  </script>

</body>
