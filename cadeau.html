<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Un Cadeau pour Toi 🎁</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:       #c9a84c;
      --gold-light: #f0d080;
      --gold-dim:   #8a6820;
      --deep:       #0a0a14;
      --navy2:      #112240;
      --surface2:   #1e2d45;
      --text:       #eee8d8;
      --text-dim:   #9aaac0;
      --radius:     16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--deep);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(70px, 10dvh, 100px) clamp(14px, 4vw, 32px) 60px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Fond étoilé ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 80% 60% at 20% 15%, rgba(30,50,100,0.75) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 80% 85%, rgba(50,25,80,0.65) 0%, transparent 65%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1.5px 1.5px at  6% 10%, rgba(255,255,255,0.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 20% 35%, rgba(255,255,255,0.60) 0%, transparent 100%),
        radial-gradient(2px   2px   at 36%  6%, rgba(255,255,255,0.90) 0%, transparent 100%),
        radial-gradient(1px   1px   at 53% 22%, rgba(255,255,255,0.65) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 68% 47%, rgba(255,255,255,0.55) 0%, transparent 100%),
        radial-gradient(2px   2px   at 81% 16%, rgba(255,255,255,0.80) 0%, transparent 100%),
        radial-gradient(1px   1px   at 46% 80%, rgba(255,255,255,0.70) 0%, transparent 100%),
        radial-gradient(1px   1px   at 28% 55%, rgba(201,168,76,0.50)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 76%, rgba(201,168,76,0.40)  0%, transparent 100%);
      animation: starDrift 22s ease-in-out infinite alternate;
    }
    @keyframes starDrift { to { transform: translateY(-10px) translateX(6px); } }

    /* ── Barre dorée ── */
    .deco-line {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 99;
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-light), var(--gold), var(--gold-dim), transparent);
      animation: lineGlow 3s ease-in-out infinite;
    }
    @keyframes lineGlow { 0%,100%{opacity:.75;} 50%{opacity:1; box-shadow:0 0 22px var(--gold);} }

    /* ── Retour ── */
    .retour {
      position: fixed; top: 18px; left: 18px; z-index: 999;
      padding: 7px 16px;
      border: 1px solid var(--gold-dim); border-radius: 30px;
      background: rgba(20,24,42,0.75); color: var(--gold-light);
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.62rem, 1.4vw, 0.78rem);
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      text-decoration: none; backdrop-filter: blur(10px); transition: all .3s;
    }
    .retour:hover { background: var(--gold-dim); color: #fff; transform: translateX(-3px); }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: clamp(24px, 4dvh, 42px);
      animation: fadeDown 1s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .header-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.2rem, 6.5vw, 4rem);
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 18px rgba(201,168,76,0.4));
    }
    .gold-divider {
      width: clamp(80px, 15vw, 130px); height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: clamp(10px, 2dvh, 16px) auto;
    }
    .header-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.88rem, 2vw, 1.1rem); color: var(--text-dim);
    }

    /* ══════════════════════════════════════════
       SCÈNE — conteneur empilé (position:relative)
       La boîte est par-dessus, la photo en dessous
    ══════════════════════════════════════════ */
    .scene {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    /* ── PHOTO — toujours dans le flux, cachée au départ ── */
    .photo-wrap {
      width: 100%;
      opacity: 0;
      transform: translateY(40px) scale(0.85);
      transition: none;
      pointer-events: none;
      order: 1;   /* apparaît AU-DESSUS de la boîte dans le flux */
    }
    .photo-wrap.fly-out {
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1) 0.45s,
                  transform 0.9s cubic-bezier(0.16,1,0.3,1) 0.45s;
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    /* Cadre doré photo */
    .photo-frame {
      padding: 4px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dim), var(--gold), var(--gold-light));
      border-radius: var(--radius);
      box-shadow: 0 0 50px rgba(201,168,76,0.25), 0 20px 60px rgba(0,0,0,0.65);
    }
    .photo-wrap.fly-out .photo-frame {
      animation: frameGlow 3s ease-in-out 1.2s infinite;
    }
    @keyframes frameGlow {
      0%,100% { box-shadow: 0 0 30px rgba(201,168,76,0.2), 0 20px 60px rgba(0,0,0,0.65); }
      50%      { box-shadow: 0 0 65px rgba(201,168,76,0.6), 0 20px 60px rgba(0,0,0,0.65); }
    }
    .photo-inner { border-radius: calc(var(--radius) - 3px); overflow: hidden; }
    .photo-img {
      width: 100%; display: block;
      height: auto;
      max-height: none;
      object-fit: contain;
      border-radius: calc(var(--radius) - 3px);
    }
    .photo-placeholder {
      width: 100%; min-height: clamp(160px, 35vw, 240px);
      background: linear-gradient(145deg, var(--surface2), var(--navy2));
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 40px 20px; text-align: center;
      border-radius: calc(var(--radius) - 3px);
    }
    .photo-placeholder p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1rem); color: var(--text-dim);
    }

    /* Caption */
    .photo-caption {
      text-align: center; margin-top: 14px;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(1.5rem, 4.5vw, 2.4rem);
      color: var(--gold-light);
      filter: drop-shadow(0 0 14px rgba(201,168,76,0.5));
      opacity: 0;
      transition: opacity 1s ease 1.3s;
    }
    .photo-wrap.fly-out .photo-caption { opacity: 1; }

    /* Guirlande */
    .garland {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: clamp(5px, 1.2vw, 10px);
      width: 100%; margin-top: 10px;
      opacity: 0; transition: opacity 0.6s ease 1.6s;
    }
    .photo-wrap.fly-out .garland { opacity: 1; }
    .garland-bulb {
      width: clamp(9px, 1.8vw, 15px); height: clamp(14px, 2.8vw, 21px);
      border-radius: 50% 50% 40% 40%;
      box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
      animation: bulbFlicker 1.5s ease-in-out infinite alternate;
    }
    .garland-bulb:nth-child(6n+1){background:#ff4444;color:#ff4444;animation-delay:0s;}
    .garland-bulb:nth-child(6n+2){background:#ffdd57;color:#ffdd57;animation-delay:.2s;}
    .garland-bulb:nth-child(6n+3){background:#44bbff;color:#44bbff;animation-delay:.4s;}
    .garland-bulb:nth-child(6n+4){background:#44ff88;color:#44ff88;animation-delay:.6s;}
    .garland-bulb:nth-child(6n+5){background:#ff88dd;color:#ff88dd;animation-delay:.8s;}
    .garland-bulb:nth-child(6n+6){background:var(--gold-light);color:var(--gold-light);animation-delay:1s;}
    @keyframes bulbFlicker { 0%{opacity:.6;transform:scale(1);} 100%{opacity:1;transform:scale(1.12);} }

    /* ══════════════════════════════════════════
       BOÎTE CADEAU
    ══════════════════════════════════════════ */
    .gift-section {
      order: 2;    /* sous la photo dans le flux */
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: clamp(16px, 3dvh, 28px);
    }

    .gift-scene {
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      perspective: 600px;   /* ← fix 3D rotateX du couvercle */
    }
    .gift-scene:hover .gift-box { transform: scale(1.05) rotate(-1.5deg); }

    .gift-box {
      position: relative;
      width: clamp(150px, 38vw, 240px);
      height: clamp(130px, 32vw, 210px);
      transition: transform 0.3s ease;
    }

    /* Corps */
    .box-body {
      position: absolute; bottom: 0; left: 0; right: 0; height: 75%;
      background: linear-gradient(145deg, #c01828, #880e18);
      border-radius: 6px 6px 10px 10px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    /* Ruban vertical corps */
    .box-body::after {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 18%; height: 100%;
      background: linear-gradient(180deg, rgba(255,210,80,0.95), rgba(180,130,20,0.85));
      border-radius: 2px;
    }

    /* Couvercle */
    .box-lid {
      position: absolute; top: 0; left: -5px; right: -5px; height: 30%;
      background: linear-gradient(145deg, #de1a2c, #9a0e1c);
      border-radius: 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      transform-origin: center bottom;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4,0,0.2,1), opacity 0.55s ease;
    }
    /* Ruban vertical couvercle */
    .box-lid::after {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 20%; height: 100%;
      background: linear-gradient(180deg, rgba(255,210,80,0.95), rgba(180,130,20,0.85));
      border-radius: 2px;
    }

    /* Nœud */
    .box-bow {
      position: absolute;
      top: clamp(-20px, -4.5vw, -10px);
      left: 50%; transform: translateX(-50%);
      width: clamp(50px, 13vw, 82px); height: clamp(30px, 8vw, 50px);
      z-index: 3;
      transition: transform 0.65s ease, opacity 0.45s ease;
    }
    .bow-loop {
      position: absolute; width: 46%; height: 90%;
      border: clamp(6px, 1.8vw, 11px) solid var(--gold);
      border-radius: 50% 50% 0 0; top: 0;
    }
    .bow-loop.left  { left: 0;  transform: rotate(-30deg); border-color: var(--gold-light); }
    .bow-loop.right { right: 0; transform: rotate(30deg); }
    .bow-center {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: clamp(10px, 2.5vw, 16px); height: clamp(10px, 2.5vw, 16px);
      background: radial-gradient(circle, var(--gold-light), var(--gold));
      border-radius: 50%; box-shadow: 0 0 10px var(--gold);
    }

    /* ── États après ouverture ── */
    .gift-scene.opened .box-lid {
      transform: rotateX(-115deg);
      opacity: 0;
    }
    .gift-scene.opened .box-bow {
      transform: translateX(-50%) translateY(-60px) scale(0.15) rotate(180deg);
      opacity: 0;
    }

    /* Hint */
    .click-hint {
      margin-top: 16px;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.78rem, 1.8vw, 0.95rem);
      color: var(--gold-dim); letter-spacing: 2px; text-transform: uppercase;
      animation: hintPulse 2s ease-in-out infinite;
      transition: opacity 0.5s ease;
    }
    @keyframes hintPulse { 0%,100%{opacity:.45;} 50%{opacity:1;} }
    .click-hint.hide { opacity: 0; pointer-events: none; }

    /* ── Confettis ── */
    .confetti-piece {
      position: fixed; pointer-events: none; z-index: 50;
      animation: confettiFall linear forwards; border-radius: 2px;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-8vh) translateX(0) rotate(0deg); opacity: 0; }
      5%   { opacity: 1; }
      100% { transform: translateY(110vh) translateX(var(--dx, 40px)) rotate(var(--rot, 540deg)); opacity: 0; }
    }

    /* ── Particules ── */
    .particle {
      position: fixed; pointer-events: none; z-index: 10;
      animation: partFloat linear forwards;
    }
    @keyframes partFloat {
      0%   { transform: translateY(0) translateX(0); opacity: .9; }
      100% { transform: translateY(-88vh) translateX(var(--dx, 20px)); opacity: 0; }
    }

    /* ══════════════════════════
       RESPONSIVE
    ══════════════════════════ */
    @media (max-width: 480px) {
      .gift-box {
        width: clamp(120px, 44vw, 180px);
        height: clamp(105px, 38vw, 155px);
      }
    }
    @media (max-width: 360px) {
      body { padding-left: 10px; padding-right: 10px; }
      .header-title { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <div class="deco-line"></div>
  <a href="accueil.html" class="retour">← Retour</a>

  <!-- Audio -->
  <audio id="bdayAudio" src="joyeux_anniversaire.mp3" preload="auto"></audio>

  <!-- Header -->
  <header class="header">
    <h1 class="header-title">Un cadeau pour toi</h1>
    <div class="gold-divider"></div>
    <p class="header-sub">Quelque chose de spécial t'attend…</p>
  </header>

  <!-- Scène principale -->
  <div class="scene">

    <!-- 1. Photo (order:1 → s'affiche au-dessus de la boîte) -->
    <div class="photo-wrap" id="photoWrap">
      <div class="photo-frame">
        <div class="photo-inner">
          <img src="photo.jpeg" alt="Photo cadeau" class="photo-img"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
          <div class="photo-placeholder" style="display:none">
            <span style="font-size:3rem">📸</span>
            <p>Ajoute <strong>photo.jpeg</strong> dans le même dossier</p>
          </div>
        </div>
      </div>
      <p class="photo-caption">Joyeux Anniversaire Mon Meilleur 💙</p>
      <div class="garland" id="garland"></div>
    </div>

    <!-- 2. Boîte cadeau (order:2 → en dessous) -->
    <div class="gift-section">
      <div class="gift-scene" id="giftScene" onclick="openGift()">
        <div class="gift-box">
          <div class="box-bow">
            <div class="bow-loop left"></div>
            <div class="bow-loop right"></div>
            <div class="bow-center"></div>
          </div>
          <div class="box-lid"></div>
          <div class="box-body"></div>
        </div>
      </div>
      <p class="click-hint" id="clickHint">✦ Clique pour ouvrir ✦</p>
    </div>

  </div>

  <script>
    /* ── Guirlande ── */
    const garland = document.getElementById('garland');
    for (let i = 0; i < 20; i++) {
      const b = document.createElement('div');
      b.className = 'garland-bulb';
      garland.appendChild(b);
    }

    let opened = false;

    function openGift() {
      if (opened) return;
      opened = true;

      /* 1. Ouvrir la boîte */
      document.getElementById('giftScene').classList.add('opened');
      document.getElementById('clickHint').classList.add('hide');

      /* 2. Musique */
      const audio = document.getElementById('bdayAudio');
      audio.volume = 0.85;
      audio.play().catch(() => {});

      /* 3. Confettis */
      for (let i = 0; i < 80; i++) setTimeout(spawnConfetti, i * 35);

      /* 4. Photo apparaît après l'animation du couvercle */
      setTimeout(() => {
        document.getElementById('photoWrap').classList.add('fly-out');
        for (let i = 0; i < 25; i++) setTimeout(spawnParticle, i * 55);
      }, 500);
    }

    /* ── Confettis ── */
    const confColors = ['#ff4444','#ffdd57','#44bbff','#44ff88','#ff88dd','#f0d080','#ffffff','#ff8844'];
    function spawnConfetti() {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      const size = Math.random() * 10 + 6;
      c.style.width  = size + 'px';
      c.style.height = (size * 0.55) + 'px';
      c.style.background = confColors[Math.floor(Math.random() * confColors.length)];
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.top  = '-5vh';
      c.style.setProperty('--dx',  (Math.random() * 220 - 110) + 'px');
      c.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
      c.style.animationDuration = (2.8 + Math.random() * 3) + 's';
      c.style.animationDelay    = (Math.random() * 0.8) + 's';
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }

    /* ── Particules burst ── */
    const pSym = ['✦','✧','⋆','✩','◆','💙','⭐','🎂'];
    const pCol = ['#c9a84c','#f0d080','#ffffff','#ff88dd','#44bbff','#44ff88'];
    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = pSym[Math.floor(Math.random() * pSym.length)];
      p.style.color = pCol[Math.floor(Math.random() * pCol.length)];
      p.style.left  = (Math.random() * 100) + 'vw';
      p.style.top   = '50dvh';
      p.style.setProperty('--dx', (Math.random() * 160 - 80) + 'px');
      p.style.fontSize = (Math.random() * 14 + 9) + 'px';
      p.style.animationDuration = (2.2 + Math.random() * 2.5) + 's';
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }

    /* ── Particules ambiantes ── */
    setInterval(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = ['✦','✧','·','⋆'][Math.floor(Math.random() * 4)];
      p.style.color = '#c9a84c';
      p.style.left  = (Math.random() * 100) + 'vw';
      p.style.top   = '96dvh';
      p.style.setProperty('--dx', (Math.random() * 100 - 50) + 'px');
      p.style.fontSize = (Math.random() * 8 + 7) + 'px';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }, window.innerWidth < 600 ? 2000 : 1400);
  </script>

</body>
</html>
